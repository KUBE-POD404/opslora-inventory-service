name: Inventory Image Build

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: |
          TAG=${GITHUB_SHA::7}
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/$OWNER/$REPO" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          docker buildx build \
            --load \
            -t "${{ steps.image.outputs.image }}:${{ steps.meta.outputs.tag }}" \
            .

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
          | sudo sh -s -- -b /usr/local/bin

      - name: Scan image
        run: |
          trivy image \
            --vuln-type library \
            --severity HIGH,CRITICAL \
            --format sarif \
            --output trivy-report.sarif \
            --exit-code 1 \
            "${{ steps.image.outputs.image }}:${{ steps.meta.outputs.tag }}"

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-report.sarif

      - name: Push image
        run: |
          docker push "${{ steps.image.outputs.image }}:${{ steps.meta.outputs.tag }}"

      - name: Summary
        run: |
          echo "Pushed ${{ steps.image.outputs.image }}:${{ steps.meta.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
